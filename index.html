<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Universe Terminal - Analog Horror</title>
  <link rel="stylesheet" href="Webpage/Styles/index.css">
</head>
<body>
  <!-- SVG filters for reality chaos effects -->
  <svg style="position: absolute; width: 0; height: 0; pointer-events: none">
    <defs>
      <filter id="liquid-filter">
        <feTurbulence baseFrequency="0.02" numOctaves="3" result="turbulence"/>
        <feDisplacementMap in="SourceGraphic" in2="turbulence" scale="6" xChannelSelector="R" yChannelSelector="G"/>
        <feGaussianBlur stdDeviation="0.4"/>
      </filter>
      <filter id="warp-filter">
        <feTurbulence baseFrequency="0.04 0.02" numOctaves="2" result="turbulence"/>
        <feDisplacementMap in="SourceGraphic" in2="turbulence" scale="12" xChannelSelector="R" yChannelSelector="B"/>
        <feColorMatrix type="hueRotate" values="120"/>
      </filter>
      <filter id="chromatic-filter">
        <feOffset dx="1.5" dy="0" in="SourceGraphic" result="red"/>
        <feOffset dx="-1.5" dy="0" in="SourceGraphic" result="blue"/>
        <feMerge>
          <feMergeNode in="red"/>
          <feMergeNode in="SourceGraphic"/>
          <feMergeNode in="blue"/>
        </feMerge>
      </filter>
    </defs>
  </svg>

  <!-- Intro overlay -->
  <div id="intro">
    <div id="intro-text"></div>
  </div>

  <!-- Tutorial overlay -->
  <div id="tutorial" style="display: none">
    <div id="tutorial-output"></div>
    <div id="tutorial-choices" style="display: none">
      <button class="choice-btn">I got this</button>
      <button class="choice-btn">Sure, tell me</button>
    </div>
  </div>

<div id="faint-overlay">
  <div id="faint-text">...</div>
</div>
  <!-- Main game environment -->
  <div id="game-environment" style="display: none">
    <div id="monitor-shell">
      <div class="monitor-speaker-left"></div>
    <div class="monitor-speaker-right"></div>
    <div class="wear-corner tl"></div>
    <div class="wear-corner tr"></div>
    <div class="wear-corner bl"></div>
    <div class="wear-corner br"></div>
    <div class="power-led"></div>
    <div class="dust-texture"></div>
      <div id="monitor-bezel">
        <div id="game">
          <!-- Screen effects -->
          <div class="screen-overlay"></div>
          <div class="screen-curve"></div>
          <div class="screen-flicker"></div>
          <div class="screen-glow"></div>
          <div class="screen-vignette"></div>

          <div id="background">
            <div id="planet"></div>
          </div>

          <div id="output"></div>

          <div class="universe-overlay"></div>
          
          <div class="drifting-fog"></div>
          <div class="distant-world"></div>
          <div class="distant-world-2"></div>
          <div class="aurora"></div>
          <div class="deep-space-hum"></div>

          <div id="sidebar">
            <button id="learn-btn">Learn</button>
            <button id="pray-btn">Pray</button>
            <button id="sleep-btn">Sleep</button>
            <button id="meditate-btn">Meditate</button>
            <button id="deep-meditate-btn">Deep Medication (50)</button>
            <button id="dict-btn">Dictionary</button>
          </div>

          <div id="dictionary-panel" style="display: none">
            <div id="dictionary-content"></div>
          </div>
       
        </div>
      </div>
     <!--<div id="monitor-stand"></div>--> 
    </div>

    <div id="terminal-platform">
      <div id="terminal-label">ARCHITECT_OS v1.0.4</div>
      <div id="terminal">
        <input type="text" id="player-input" placeholder=">_" autocomplete="off">
        <button id="submit-btn">EXEC</button>
      </div>
    </div>
  </div>

  <script src="Webpage/Scripts/index_script.js"></script>
  <script src="Webpage/Scripts/tutorial_script.js"></script>
  <script type="module" src="Webpage/Scripts/game_script.js"></script>
</body>
</html>
